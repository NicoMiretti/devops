# -- GitOps Core: ArgoCD Project --
# Proyecto raiz para la gestion de ArgoCD
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: argocd-management
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Proyecto de gestion de ArgoCD
  sourceRepos:
    - '*'
  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: '*'
      kind: ClusterRoleBinding
    - group: '*'
      kind: ClusterRole
  namespaceResourceWhitelist:
    - group: 'argoproj.io'
      kind: Application
    - group: 'argoproj.io'
      kind: AppProject
    - group: 'argoproj.io'
      kind: ApplicationSet
    - group: '*'
      kind: Secret
    - group: '*'
      kind: ServiceAccount
    - group: '*'
      kind: Role
    - group: '*'
      kind: RoleBinding
