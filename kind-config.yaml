# Kind cluster config para ambiente portable
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: devops-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # ArgoCD UI
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # ArgoCD HTTPS
      - containerPort: 30443
        hostPort: 8443
        protocol: TCP
