# ==============================================================================
# -- Valores por defecto para el chart de app-component (BASE GENERICA)       --
# ==============================================================================

# -- Configuracion General de la Aplicacion --
replicaCount: 1

image:
  repository: nginx
  pullPolicy: IfNotPresent
  tag: ""

# -- Nombres de los Recursos --
fullnameOverride: ""

# -- Service Account --
serviceAccount:
  create: true
  name: ""

# -- Configuracion de Red --
service:
  type: ClusterIP
  port: 8080

# Variables de entorno adicionales para inyectar en el contenedor
env: []

# ConfigMap con propiedades para envFrom
envFromProperties:
  enabled: false
  configMapName: ""
  data: {}

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: mi-aplicacion.local
      paths:
        - path: /
          pathType: ImplementationSpecific

# -- Recursos y Autoscaling --
resources:
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
