apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-component.fullname" . }}
  labels:
    {{- include "app-component.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "app-component.fullname" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "app-component.fullname" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "app-component.serviceAccountName" . }}
      containers:
        - name: {{ include "app-component.fullname" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- toYaml .Values.env | nindent 12 }}
          {{- if .Values.envFromProperties.enabled }}
          envFrom:
            - configMapRef:
                name: {{ .Values.envFromProperties.configMapName | default (include "app-component.fullname" .) }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
